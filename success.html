<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed — Afreen Traders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="rewards.css">
    <style>
        .success-main {
            min-height:100vh; display:flex; align-items:center; justify-content:center;
            padding:2rem; position:relative;
            background:radial-gradient(ellipse at center,rgba(26,74,58,0.15) 0%,var(--bg-primary) 70%);
        }
        .success-card {
            text-align:center; max-width:520px; width:100%; padding:3rem 2rem;
            background:var(--bg-card); border:1px solid var(--border);
            border-radius:var(--radius); backdrop-filter:blur(15px);
            box-shadow:var(--shadow);
            animation:cardFadeIn 0.8s ease;
        }
        @keyframes cardFadeIn { from{opacity:0;transform:translateY(30px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }

        /* Animated Checkmark */
        .success-icon { margin:0 auto 2rem; width:90px; height:90px; position:relative; }
        .success-circle {
            width:90px; height:90px; border-radius:50%;
            border:3px solid var(--green-mid);
            animation:circleIn 0.6s 0.2s ease forwards;
            opacity:0;
            position:absolute; top:0; left:0;
            box-shadow:0 0 30px rgba(45,106,79,0.3);
        }
        @keyframes circleIn { from{opacity:0;transform:scale(0.5)} to{opacity:1;transform:scale(1)} }
        .success-check {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            width:40px; height:40px;
        }
        .success-check polyline {
            stroke:var(--green-light); stroke-width:3; fill:none;
            stroke-linecap:round; stroke-linejoin:round;
            stroke-dasharray:50; stroke-dashoffset:50;
            animation:checkDraw 0.5s 0.7s ease forwards;
        }
        @keyframes checkDraw { to{stroke-dashoffset:0} }

        .success-title {
            font-family:var(--font-display); font-size:2rem; font-weight:400;
            color:var(--gold); margin-bottom:0.5rem;
        }
        .success-subtitle {
            color:var(--text-secondary); font-size:1.05rem; margin-bottom:2rem;
        }
        .success-ritual {
            font-family:var(--font-display); font-size:1.15rem;
            color:var(--text-secondary); font-style:italic;
            margin-bottom:2rem; padding:1rem;
            border:1px solid var(--border); border-radius:var(--radius-sm);
            background:var(--bg-glass);
        }

        .order-details {
            text-align:left; margin-bottom:2rem;
            padding:1.2rem; border:1px solid var(--border);
            border-radius:var(--radius-sm); background:var(--bg-glass);
        }
        .order-detail-row {
            display:flex; justify-content:space-between;
            padding:0.5rem 0; font-size:0.9rem;
            border-bottom:1px solid rgba(255,255,255,0.03);
        }
        .order-detail-row:last-child { border-bottom:none; }
        .detail-label { color:var(--text-muted); font-size:0.8rem; text-transform:uppercase; letter-spacing:0.05em; }
        .detail-value { color:var(--text-primary); font-weight:500; }
        .status-badge {
            display:inline-block; padding:0.25rem 0.8rem;
            background:rgba(201,168,76,0.15); color:var(--gold);
            border-radius:20px; font-size:0.75rem; font-weight:600;
            letter-spacing:0.05em; text-transform:uppercase;
        }

        .success-actions {
            display:flex; flex-direction:column; gap:0.8rem; align-items:center;
        }
        .btn-whatsapp {
            display:inline-flex; align-items:center; gap:0.5rem;
            padding:0.85rem 2rem; border-radius:var(--radius-sm);
            background:#25d366; color:white;
            font-size:0.85rem; font-weight:500; letter-spacing:0.05em;
            transition:all var(--transition); text-transform:uppercase;
        }
        .btn-whatsapp:hover { background:#1da851; transform:translateY(-2px); box-shadow:0 6px 20px rgba(37,211,102,0.3); }
        .btn-continue {
            display:inline-flex; align-items:center; gap:0.5rem;
            padding:0.85rem 2rem; border-radius:var(--radius-sm);
            border:1px solid var(--border); color:var(--text-secondary);
            font-size:0.85rem; letter-spacing:0.05em;
            transition:all var(--transition); text-transform:uppercase;
        }
        .btn-continue:hover { border-color:var(--gold); color:var(--gold); }

        /* Particles */
        .particles { position:fixed; inset:0; z-index:-1; pointer-events:none; }
        .particle {
            position:absolute; width:4px; height:4px; border-radius:50%;
            background:var(--gold); opacity:0;
            animation:particleFloat 3s infinite;
        }
        @keyframes particleFloat {
            0%{opacity:0;transform:translateY(0)} 20%{opacity:0.6}
            80%{opacity:0.6} 100%{opacity:0;transform:translateY(-100px)}
        }

        @media(max-width:480px) {
            .success-card { padding:2rem 1.2rem; }
            .success-title { font-size:1.6rem; }
        }
    </style>
</head>
<body>
    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <main class="success-main">
        <div class="success-card">
            <!-- Animated Checkmark -->
            <div class="success-icon">
                <div class="success-circle"></div>
                <svg class="success-check" viewBox="0 0 40 40">
                    <polyline points="10,22 18,30 32,12"/>
                </svg>
            </div>

            <h1 class="success-title">Order Confirmed!</h1>
            <p class="success-subtitle">Thank you for choosing Afreen Traders</p>

            <div class="success-ritual">
                "Your premium chai is being prepared ☕"
            </div>

            <div class="order-details" id="order-details">
                <div class="order-detail-row">
                    <span class="detail-label">Order ID</span>
                    <span class="detail-value" id="order-id">—</span>
                </div>
                <div class="order-detail-row">
                    <span class="detail-label">Amount Paid</span>
                    <span class="detail-value" id="order-amount">—</span>
                </div>
                <div class="order-detail-row">
                    <span class="detail-label">Payment Status</span>
                    <span class="status-badge">Verification Pending</span>
                </div>
                <div class="order-detail-row">
                    <span class="detail-label">Estimated Delivery</span>
                    <span class="detail-value">3–5 Business Days</span>
                </div>
            </div>

            <div class="success-actions">
                <a href="#" class="btn-whatsapp" id="whatsapp-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    Confirm on WhatsApp
                </a>
                <a href="index.html" class="btn-continue">Continue Shopping →</a>
            </div>
        </div>
    </main>

    <script src="store.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const order = AfreenStore.Orders.getLast();
            if (order) {
                document.getElementById('order-id').textContent = order.id;
                document.getElementById('order-amount').textContent = `₹${order.total}`;
                const msg = encodeURIComponent(`Hello Afreen Traders Team, I completed payment for Order #${order.id}. Please verify my payment.\n\nName: ${order.customerName}\nPhone: ${order.customerPhone}\nAmount: ₹${order.total}`);
                document.getElementById('whatsapp-link').href = `https://wa.me/919515643942?text=${msg}`;
            }

            /* Particles */
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 3 + 's';
                p.style.animationDuration = (2 + Math.random() * 2) + 's';
                container.appendChild(p);
            }
        });
    </script>
    <script src="store.js"></script>
    <script src="rewards.js"></script>
</body>
</html>
